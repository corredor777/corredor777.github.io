<div class="entrada-data">2026.05.15</div>
<div class="entrada-corpo bloco-webgl">
    <canvas id="vortex-canvas" width="480" height="480"></canvas>

    <script>
        if (window._vortexRAF) cancelAnimationFrame(window._vortexRAF);

        (function() {

            const canvas = document.getElementById('vortex-canvas');
            const gl = canvas.getContext('webgl', {
                alpha: true,
                premultipliedAlpha: false,
                preserveDrawingBuffer: false
            });
            if (!gl) return;

            gl.enable(gl.BLEND);
            gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
            gl.clearColor(0.0, 0.0, 0.0, 0.0);

            /* ── SHADERS ────────────────────────────────────────── */

            // a_vida: valor 0.0 a 1.0 passado por partícula
            // a_vida vai para o fragment shader como varying
            const vertSrc = `
                attribute vec2 a_pos;
                attribute float a_vida;
                varying float v_vida;
                void main() {
                    gl_Position = vec4(a_pos, 0.0, 1.0);
                    gl_PointSize = 2.5;
                    v_vida = a_vida;
                }
            `;

            // alpha da partícula = sua vida atual
            // partículas velhas ficam transparentes → trail
            const fragSrc = `
                precision mediump float;
                varying float v_vida;
                void main() {
                    gl_FragColor = vec4(0.85, 0.82, 0.78, v_vida);
                }
            `;

            /* ── COMPILAÇÃO ─────────────────────────────────────── */

            function compilarShader(tipo, src) {
                const shader = gl.createShader(tipo);
                gl.shaderSource(shader, src);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('[VORTEX] shader:', gl.getShaderInfoLog(shader));
                    return null;
                }
                return shader;
            }

            const prog = gl.createProgram();
            gl.attachShader(prog, compilarShader(gl.VERTEX_SHADER, vertSrc));
            gl.attachShader(prog, compilarShader(gl.FRAGMENT_SHADER, fragSrc));
            gl.linkProgram(prog);
            gl.useProgram(prog);

            /* ── PARTÍCULAS ─────────────────────────────────────── */

            const phi            = (1 + Math.sqrt(5)) / 2;
            const ANGULO_DOURADO = 2 * Math.PI / (phi * phi);
            const N              = 377;
            const VOLTAS         = phi;

            const angulos = new Float32Array(N);
            const raios   = new Float32Array(N);
            const vidas   = new Float32Array(N);  // trail por partícula

            // Quanto a vida decai por segundo — controla o trail
            // 0.4 = trail médio | 0.2 = trail longo | 0.8 = trail curto
            const DECAIMENTO = 0.1;

            function inicializar(i) {
                angulos[i] = i * ANGULO_DOURADO;
                raios[i]   = 0.10 + (Math.sqrt(i) / Math.sqrt(N)) * 0.75;
                // vida aleatória no início para não nascerem todas juntas
                vidas[i]   = Math.random();
            }

            for (let i = 0; i < N; i++) inicializar(i);

            // Buffer intercalado: x, y, vida por partícula
            // stride de 3 floats por partícula
            const dados = new Float32Array(N * 3);

            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, dados, gl.DYNAMIC_DRAW);

            const BYTES = Float32Array.BYTES_PER_ELEMENT;

            const atribPos  = gl.getAttribLocation(prog, 'a_pos');
            const atribVida = gl.getAttribLocation(prog, 'a_vida');

            gl.enableVertexAttribArray(atribPos);
            gl.enableVertexAttribArray(atribVida);

            // stride = 3 floats (x, y, vida)
            // a_pos:  offset 0
            // a_vida: offset 2 floats
            gl.vertexAttribPointer(atribPos,  2, gl.FLOAT, false, 3 * BYTES, 0);
            gl.vertexAttribPointer(atribVida, 1, gl.FLOAT, false, 3 * BYTES, 2 * BYTES);

            /* ── CAMPO DE FLUXO ─────────────────────────────────── */

            const ROTACAO = 0.012;
            const SUCCAO  = 0.0018;

            // Controle de tempo — resolve diferença de framerate entre browsers
            let ultimoTempo = null;

            function frame(agora) {
                if (!ultimoTempo) ultimoTempo = agora;
                // delta em segundos — independente de framerate
                const delta = Math.min((agora - ultimoTempo) / 1000, 0.05);
                ultimoTempo = agora;

                for (let i = 0; i < N; i++) {
                    // Movimento escalado por delta — mesmo resultado em 60hz e 144hz
                    angulos[i] -= (ROTACAO / (raios[i] + 0.1)) * delta * 60;
                    raios[i]   -= SUCCAO * delta * 60;
                    vidas[i]   -= DECAIMENTO * delta;

                    // Relança quando some ou chega ao centro
                    if (raios[i] < 0.02 || vidas[i] <= 0) inicializar(i);

                    dados[i * 3]     = raios[i] * Math.cos(angulos[i]);
                    dados[i * 3 + 1] = raios[i] * Math.sin(angulos[i]);
                    dados[i * 3 + 2] = Math.max(0.0, vidas[i]);
                }

                gl.clear(gl.COLOR_BUFFER_BIT);
                gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferSubData(gl.ARRAY_BUFFER, 0, dados);
                gl.drawArrays(gl.POINTS, 0, N);

                window._vortexRAF = requestAnimationFrame(frame);
            }

            window._vortexRAF = requestAnimationFrame(frame);

        })();
    </script>
</div>
